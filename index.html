<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Slap The Stress — A free minimalist one-click stress relief tool. Think of what's stressing you. Then slap." />
  <title>Slap The Stress</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #fafaf9;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      min-height: 100vh;
    }

    .label {
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 0.8rem;
    }

    .title {
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 700;
      color: #111;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #aaa;
      font-weight: 300;
      margin-bottom: 3.5rem;
    }

    .ripple-host {
      position: relative;
      display: inline-block;
      margin-bottom: 2.5rem;
    }

    .slap-btn {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: none;
      background: #111;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      outline: none;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.08s ease, opacity 0.2s ease;
      margin: 0 auto;
    }

    .slap-btn:hover { opacity: 0.85; }
    .slap-btn:active { transform: scale(0.93); }
    .slap-btn.shake { animation: slap-shake 0.35s ease; }

    @keyframes slap-shake {
      0%   { transform: scale(0.87) rotate(-5deg); }
      30%  { transform: scale(1.08) rotate(4deg); }
      65%  { transform: scale(0.96) rotate(-2deg); }
      100% { transform: scale(1) rotate(0); }
    }

    .btn-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .btn-text {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.07);
      width: 180px;
      height: 180px;
      left: 0;
      top: 0;
      transform: scale(0);
      animation: rout 0.55s ease-out forwards;
      pointer-events: none;
    }

    @keyframes rout {
      to { transform: scale(4); opacity: 0; }
    }

    .reaction {
      font-size: 1.1rem;
      font-weight: 500;
      color: #111;
      min-height: 1.8rem;
      margin-bottom: 2rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .reaction.show {
      opacity: 1;
      transform: translateY(0);
    }

    .stats {
      display: flex;
      gap: 3rem;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .stat-num {
      font-size: 1.8rem;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.02em;
    }

    .stat-num.bump { animation: bump 0.2s ease; }

    @keyframes bump {
      50% { transform: scale(1.35); }
    }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #bbb;
    }

    .milestone {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #ccc;
      letter-spacing: 0.04em;
      font-style: italic;
      min-height: 1.2em;
      transition: color 0.4s ease;
    }

    .milestone.lit { color: #888; }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.7rem;
      color: #ddd;
      letter-spacing: 0.08em;
    }

    @media (max-width: 480px) {
      .slap-btn { width: 150px; height: 150px; }
      .stats { gap: 2rem; }
    }
  </style>
</head>
<body>

  <div id="wrap">
    <p class="label">stress relief tool</p>
    <h1 class="title">Slap The Stress</h1>
    <p class="subtitle">Think of what's stressing you. Then slap.</p>

    <div class="ripple-host" id="rhost">
      <button class="slap-btn" id="slap-btn" onclick="doSlap()">
        <span class="btn-icon">👋</span>
        <span class="btn-text">Slap it</span>
      </button>
    </div>

    <div class="reaction" id="reaction"></div>

    <div class="stats">
      <div class="stat">
        <span class="stat-num" id="s-count">0</span>
        <span class="stat-label">total slaps</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="s-stress">😐</span>
        <span class="stat-label">stress level</span>
      </div>
    </div>

    <p class="milestone" id="milestone">Your stress doesn't stand a chance.</p>

    <p class="footer">slapthestress.tk</p>
  </div>

  <script>
    var count = 0;

    var reactions = [
      "That felt good, didn't it?",
      "Stress: 0. You: 1.",
      "Keep going. It can take it.",
      "That one was personal.",
      "Absolutely obliterated.",
      "Your boss never saw it coming.",
      "The Monday meeting didn't survive.",
      "Stress has left the chat.",
      "Clinical. Precise. Devastating.",
      "That deadline never had a chance.",
      "Your inbox is trembling.",
      "Taxes? Gone.",
      "Whatever it was — handled.",
      "The audacity of your stress. Slapped.",
      "You look calmer already.",
      "That was therapeutic, actually.",
      "Certified stress assassin.",
      "Not all heroes wear capes.",
      "One slap at a time.",
      "The universe felt that one.",
      "Even your plants feel better.",
      "Somewhere, a spreadsheet just flinched.",
      "Pure. Unbridled. Catharsis.",
      "10/10 slap. No notes.",
    ];

    var stressLevels = ["😐", "😤", "😠", "😡", "🤬", "💀"];

    var milestones = {
      5:   "Warming up. Stress is nervous.",
      10:  "10 slaps. You mean business.",
      25:  "25 slaps. Unstoppable energy.",
      50:  "50 slaps. Legendary status.",
      100: "100 slaps. You are the therapy.",
      200: "200 slaps. Are you okay? (Impressive.)",
      500: "500 slaps. Nothing can stop you.",
    };

    function doSlap() {
      count++;

      var btn       = document.getElementById('slap-btn');
      var reaction  = document.getElementById('reaction');
      var countEl   = document.getElementById('s-count');
      var stressEl  = document.getElementById('s-stress');
      var milestone = document.getElementById('milestone');
      var rhost     = document.getElementById('rhost');

      btn.classList.remove('shake');
      void btn.offsetWidth;
      btn.classList.add('shake');

      var rip = document.createElement('div');
      rip.className = 'ripple';
      rhost.appendChild(rip);
      setTimeout(function() { rip.remove(); }, 600);

      reaction.classList.remove('show');
      void reaction.offsetWidth;
      reaction.textContent = reactions[Math.floor(Math.random() * reactions.length)];
      reaction.classList.add('show');

      countEl.classList.remove('bump');
      void countEl.offsetWidth;
      countEl.textContent = count;
      countEl.classList.add('bump');

      var lvl = Math.min(Math.floor(count / 10), stressLevels.length - 1);
      stressEl.textContent = stressLevels[lvl];

      if (milestones[count]) {
        milestone.textContent = milestones[count];
        milestone.classList.add('lit');
      }
    }
  </script>

</body>
</html>
